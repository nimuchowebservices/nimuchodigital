{% extends 'main/base.html' %}
{% block title %}Add New Project{% endblock %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white"><h3>Add Project</h3></div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label">Title</label><input type="text" name="title" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Category</label><select name="category" class="form-select"><option value="graphic_design">Graphic Design</option><option value="web_development">Web Development</option><option value="digital_marketing">Digital Marketing</option><option value="branding">Branding</option><option value="video_editing">Video Editing</option></select></div>
                        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
                        <div class="mb-3"><label class="form-label">Client Name</label><input type="text" name="client_name" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Completion Date</label><input type="date" name="completion_date" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Project URL (optional)</label><input type="url" name="project_url" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">Project Image</label><input type="file" name="image" class="form-control" accept="image/*"></div>
                        <button type="submit" class="btn btn-primary">Add Project</button>
                        <a href="{% url 'projects' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
