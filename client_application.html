{% extends 'main/base.html' %}
{% block title %}Client Application{% endblock %}
{% block content %}
<div class="container my-5">
    <h1 class="text-center mb-4">Apply for Services</h1>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Submit Application</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
